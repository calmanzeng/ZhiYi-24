name: lumbar_puncture
display_name: 腰椎穿刺术 (Lumbar Puncture)
category: procedural
exam_station: 3
difficulty: advanced
version: 1.0.0
description: 评估腰椎穿刺操作规范性：体位摆放、穿刺点定位、进针角度与深度、脑脊液留取
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 23
  name: left_hip
  type: hip
  required: true
- id: 24
  name: right_hip
  type: hip
  required: true
- id: 25
  name: left_knee
  type: knee
  required: false
- id: 26
  name: right_knee
  type: knee
  required: false
features:
- name: patient_curling
  description: 患者体位屈曲程度
  type: spine_angle
  weight: 0.2
- name: insertion_angle
  description: 穿刺角度(相对脊柱)
  type: angle
  weight: 0.3
- name: hand_stability
  description: 操作手稳定性
  type: variance
  weight: 0.25
- name: depth_control
  description: 进针深度控制
  type: displacement
  weight: 0.25
metrics:
- name: positioning
  display: 体位摆放
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
- name: angle_score
  display: 穿刺角度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
- name: stability
  display: 操作稳定性
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
- name: depth_accuracy
  display: 深度控制
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
feedback_rules:
- condition: patient_curling < 30
  message: 患者体位屈曲不足，建议加大屈曲角度以增宽椎间隙
  severity: warning
- condition: insertion_angle < 70 or insertion_angle > 110
  message: 腰椎穿刺进针角度应在80-90度(垂直)
  severity: critical
- condition: hand_stability > 2.0
  message: 手部抖动明显，需要更稳定的穿刺手法
  severity: critical
min_detection_frames: 50
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
