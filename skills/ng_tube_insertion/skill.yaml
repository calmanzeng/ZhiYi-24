name: ng_tube_insertion
display_name: 胃管置入术 (NG Tube Insertion)
category: procedural
exam_station: 3
difficulty: intermediate
version: 1.0.0
description: 评估胃管置入操作规范性：长度测量、润滑、插入角度、确认位置
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 0
  name: nose
  type: face
  required: true
- id: 7
  name: left_ear
  type: face
  required: false
- id: 8
  name: right_ear
  type: face
  required: false
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 23
  name: left_hip
  type: hip
  required: false
- id: 24
  name: right_hip
  type: hip
  required: false
features:
- name: nose_distance
  description: 手到鼻距离
  type: distance
  weight: 0.25
- name: insertion_angle
  description: 插入角度
  type: angle
  weight: 0.3
- name: hand_stability
  description: 手部稳定性
  type: variance
  weight: 0.25
- name: depth_movement
  description: 插入深度变化
  type: displacement
  weight: 0.2
metrics:
- name: angle_score
  display_name: 插入角度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
  target: 85
  acceptable_range:
  - 65
  - 110
- name: stability
  display_name: 手部稳定
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.25
  target: 90
  acceptable_range:
  - 70
  - 100
- name: technique
  display_name: 操作技术
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: smoothness
  display_name: 动作流畅度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
