name: percussion
display_name: 心肺叩诊 (Cardiac & Lung Percussion)
category: physical_exam
exam_station: 2
difficulty: basic
version: 1.0.0
description: 评估心肺叩诊技术：叩诊节奏、力度均匀性、手指位置、对称比较
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 19
  name: left_index
  type: finger
  required: true
- id: 20
  name: right_index
  type: finger
  required: true
features:
- name: percussion_rhythm
  description: 叩诊节奏规律性
  type: periodicity
  weight: 0.3
- name: force_uniformity
  description: 叩击力度均匀性
  type: amplitude_variance
  weight: 0.25
- name: wrist_range
  description: 腕关节活动范围
  type: range
  weight: 0.2
- name: symmetry
  description: 左右对称性
  type: comparison
  weight: 0.25
metrics:
- name: rhythm
  display: 叩诊节奏
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
- name: uniformity
  display: 力度均匀
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
- name: symmetry_score
  display: 左右对称
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.25
- name: positioning
  display: 手指位置
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.15
feedback_rules:
- condition: percussion_rhythm < 0.6
  message: 叩诊节奏不规律，保持2-3次/秒的稳定频率
  severity: warning
- condition: force_uniformity > 0.3
  message: 叩击力度不均匀，左右对比要力度一致
  severity: info
- condition: symmetry < 0.6
  message: 左右叩诊不对称，相同的区域应做对称比较
  severity: warning
min_detection_frames: 60
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
