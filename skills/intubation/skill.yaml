name: intubation
display_name: 气管插管术 (Endotracheal Intubation)
category: emergency
exam_station: 3
difficulty: advanced
version: 1.0.0
description: 评估气管插管操作规范性：喉镜持握、插管角度、操作时间、患者体位
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 0
  name: nose
  type: face
  required: true
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
features:
- name: head_position
  description: 患者头位(嗅花位)
  type: position
  weight: 0.2
- name: laryngoscope_angle
  description: 喉镜持握角度
  type: angle
  weight: 0.3
- name: insertion_speed
  description: 插管速度
  type: velocity
  weight: 0.2
- name: hand_stability
  description: 操作手稳定性
  type: variance
  weight: 0.15
- name: coordination
  description: 双手协调(喉镜+导管)
  type: correlation
  weight: 0.15
metrics:
- name: positioning
  display: 患者体位
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
- name: angle_score
  display: 喉镜角度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
- name: time_efficiency
  display: 操作时效
  unit: seconds
  ideal_range:
  - 15
  - 30
  weight: 0.25
- name: smoothness
  display: 操作流畅性
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
feedback_rules:
- condition: head_position < -15 or head_position > 15
  message: 患者头位不正确，应置于嗅花位(下颌上抬)
  severity: critical
- condition: laryngoscope_angle < 30
  message: 喉镜向上提拉角度不足(应45度)
  severity: critical
- condition: insertion_speed > 5.0
  message: 插管速度过快，可能损伤气道
  severity: warning
min_detection_frames: 60
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
