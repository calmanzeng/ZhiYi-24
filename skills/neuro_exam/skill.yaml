name: neuro_exam
display_name: 神经系统检查 (Neurological Exam)
category: physical_exam
exam_station: 2
difficulty: advanced
version: 1.0.0
description: 评估神经系统检查技术：肌力、肌张力、共济运动、深浅感觉、反射检查
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 0
  name: nose
  type: face
  required: true
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 25
  name: left_knee
  type: knee
  required: false
- id: 26
  name: right_knee
  type: knee
  required: false
features:
- name: movement_range
  description: 全范围活动(头到脚)
  type: full_body_scope
  weight: 0.25
- name: hand_symmetry
  description: 左右手协调
  type: correlation
  weight: 0.25
- name: touch_accuracy
  description: 触诊定位精度
  type: target_accuracy
  weight: 0.25
- name: rhythm
  description: 反射检查节奏
  type: periodicity
  weight: 0.25
metrics:
- name: scope
  display_name: 检查范围
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: coordination
  display_name: 双侧对比
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
  target: 85
  acceptable_range:
  - 60
  - 100
- name: precision
  display_name: 定位精准
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
  target: 90
  acceptable_range:
  - 70
  - 100
- name: technique
  display_name: 检查手法
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.2
  target: 85
  acceptable_range:
  - 60
  - 100
feedback:
  default_rules: true
min_detection_frames: 30
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
