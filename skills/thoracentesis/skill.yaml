name: thoracentesis
display_name: 胸腔穿刺术 (Thoracentesis)
category: procedural
exam_station: 3
difficulty: advanced
version: 1.0.0
description: 评估胸腔穿刺操作的规范性：穿刺点定位、进针角度、深度控制、无菌操作
model:
  type: mediapipe_pose
  model_path: ''
  num_poses: 2
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
landmarks:
- id: 11
  name: left_shoulder
  type: shoulder
  required: true
- id: 12
  name: right_shoulder
  type: shoulder
  required: true
- id: 13
  name: left_elbow
  type: elbow
  required: true
- id: 14
  name: right_elbow
  type: elbow
  required: true
- id: 15
  name: left_wrist
  type: wrist
  required: true
- id: 16
  name: right_wrist
  type: wrist
  required: true
- id: 23
  name: left_hip
  type: hip
  required: true
- id: 24
  name: right_hip
  type: hip
  required: true
features:
- name: insertion_angle
  description: 进针角度(相对胸壁)
  type: angle
  weight: 0.3
- name: hand_stability
  description: 穿刺手稳定性
  type: variance
  weight: 0.25
- name: depth_control
  description: 进针深度控制
  type: displacement
  weight: 0.25
- name: approach_speed
  description: 进针速度
  type: velocity
  weight: 0.2
metrics:
- name: angle_score
  display: 穿刺角度
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.3
- name: stability
  display: 操作稳定性
  unit: score
  ideal_range:
  - 85
  - 100
  weight: 0.3
- name: depth_accuracy
  display: 深度控制
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.25
- name: smoothness
  display: 流畅性
  unit: score
  ideal_range:
  - 80
  - 100
  weight: 0.15
feedback_rules:
- condition: insertion_angle < 70 or insertion_angle > 110
  message: 进针角度异常，胸腔穿刺应接近90度垂直进针
  severity: critical
- condition: hand_stability > 1.5
  message: 手部晃动过大，穿刺需要更稳定的手部控制
  severity: warning
- condition: approach_speed > 3.0
  message: 进针速度过快，应缓慢推进
  severity: warning
min_detection_frames: 50
data_collection:
  enabled: true
  store_raw_features: false
  anonymize: true
